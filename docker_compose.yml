services:
  postgres:
    image: postgres:17    container_name: transcendence_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: transcendence_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./srcs/backend
    container_name: transcendence_backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/transcendence_db
    ports:
      - "3000:3000"
    volumes:
      - ./srcs/backend:/app
      - /app/node_modules
    command: sh -c "npx prisma migrate dev --name init && npm run dev"

volumes:
  postgres_data: